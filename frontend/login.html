<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - ClawSight</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-white font-mono h-screen flex flex-col items-center justify-center">
  
  <div class="bg-gray-800 p-8 rounded-lg shadow-lg border border-gray-700 w-full max-w-md">
    <h1 class="text-2xl font-bold text-emerald-400 mb-6 text-center">ClawSight Login</h1>
    
    <div id="login-form">
      <label class="block text-sm text-gray-400 mb-2">Email Address</label>
      <input type="email" id="email" class="w-full bg-gray-900 border border-gray-700 rounded p-2 mb-4 text-white focus:border-emerald-500 focus:outline-none" placeholder="you@company.com">
      <button onclick="handleLogin()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2 px-4 rounded transition">Send Magic Link</button>
    </div>

    <div id="success-message" class="hidden text-center">
      <div class="text-green-400 text-xl mb-2">Check your inbox!</div>
      <p class="text-gray-400 text-sm">We sent a magic link to your email.</p>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://kfibmwbwdcejrsuahbps.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_UgtXVptJpAWZMZAOgp1rGA_e2OgLuaC'; // Public Anon Key
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // If already logged in, skip to dashboard
    async function checkExistingSession() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (session) {
        window.location.href = '/';
        return;
      }
    }
    checkExistingSession();

    async function handleLogin() {
      const email = document.getElementById('email').value;
      const { error } = await supabaseClient.auth.signInWithOtp({
        email,
        options: {
          emailRedirectTo: `${window.location.origin}/`
        }
      });
      if (error) alert(error.message);
      else {
        document.getElementById('login-form').classList.add('hidden');
        document.getElementById('success-message').classList.remove('hidden');
      }
    }
  </script>
</body>
</html>
