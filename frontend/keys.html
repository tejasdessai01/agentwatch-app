<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>API Keys - ClawSight</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-white font-mono h-screen flex flex-col p-8">

  <h1 class="text-2xl font-bold text-emerald-400 mb-8">Manage API Keys</h1>

  <div class="mb-8">
    <button onclick="createKey()" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2 px-4 rounded">Create New Key</button>
  </div>

  <div id="new-key-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center">
    <div class="bg-gray-800 p-8 rounded border border-gray-700 max-w-lg w-full">
      <h3 class="text-xl font-bold mb-4 text-white">New API Key Created</h3>
      <p class="text-gray-400 mb-2">Copy this now. You won't see it again.</p>
      <div class="bg-black p-4 rounded border border-gray-600 font-mono text-emerald-400 break-all mb-4" id="new-key-display">...</div>
      <button onclick="location.reload()" class="bg-gray-700 hover:bg-gray-600 text-white px-4 py-2 rounded">Done</button>
    </div>
  </div>

  <div class="bg-gray-800 rounded border border-gray-700 overflow-hidden">
    <table class="w-full text-left">
      <thead class="bg-gray-900 text-gray-400">
        <tr>
          <th class="p-4">Name</th>
          <th class="p-4">Prefix</th>
          <th class="p-4">Created</th>
          <th class="p-4 text-right">Actions</th>
        </tr>
      </thead>
      <tbody id="keys-list" class="text-gray-300">
        <!-- Keys go here -->
      </tbody>
    </table>
  </div>

  <script>
    const SUPABASE_URL = 'https://kfibmwbwdcejrsuahbps.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_UgtXVptJpAWZMZAOgp1rGA_e2OgLuaC';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function handleMagicLink() {
      if (window.location.hash.includes('access_token=')) {
        const params = new URLSearchParams(window.location.hash.substring(1));
        const access_token = params.get('access_token');
        const refresh_token = params.get('refresh_token');
        if (access_token && refresh_token) {
          await supabaseClient.auth.setSession({ access_token, refresh_token });
          window.history.replaceState({}, document.title, window.location.pathname);
        }
      }
    }

    async function checkAuth() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) window.location.href = '/login.html';
      loadKeys(session.access_token);
    }

    async function loadKeys(token) {
      const res = await fetch('/api/keys', { headers: { Authorization: `Bearer ${token}` } });
      const keys = await res.json();
      const tbody = document.getElementById('keys-list');
      tbody.innerHTML = keys.map(k => `
        <tr class="border-b border-gray-700">
          <td class="p-4">${k.name || 'Agent Key'}</td>
          <td class="p-4 font-mono text-gray-500">${k.key_prefix}...</td>
          <td class="p-4 text-sm text-gray-500">${new Date(k.created_at).toLocaleDateString()}</td>
          <td class="p-4 text-right">
            <button onclick="revokeKey('${k.id}', '${token}')" class="text-red-400 hover:text-red-300">Revoke</button>
          </td>
        </tr>
      `).join('');
    }

    async function createKey() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      const res = await fetch('/api/keys', {
        method: 'POST',
        headers: { Authorization: `Bearer ${session.access_token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: 'New Key' })
      });
      const data = await res.json();
      if (data.key) {
        document.getElementById('new-key-display').textContent = data.key;
        document.getElementById('new-key-modal').classList.remove('hidden');
      }
    }

    async function revokeKey(id, token) {
      if(!confirm("Revoke this key? Agents using it will stop working.")) return;
      await fetch(`/api/keys/${id}`, { method: 'DELETE', headers: { Authorization: `Bearer ${token}` } });
      location.reload();
    }

    handleMagicLink().then(checkAuth);
  </script>
</body>
</html>
